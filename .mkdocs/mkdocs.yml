site_name: Notes cours ENSIIE FISA
site_url: https://leperuvienn.github.io/notes-cours/

docs_dir: ..
site_dir: ../../notes-cours-web

theme:
  name: material

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
