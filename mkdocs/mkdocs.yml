site_name: Mes Notes
site_url: https://leperuvienn.github.io/notes-cours/

docs_dir: ..
site_dir: ../../site

exclude_docs:
  mkdocs/

theme:
  name: material

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences


extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
